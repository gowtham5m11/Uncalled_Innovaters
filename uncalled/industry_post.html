<!DOCTYPE html>
<html>
<head>
    <title>Indus Form</title>
    <link rel="stylesheet" type="text/css" href="gradient.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: linear-gradient(to bottom, #9600FF, #EEBD89);
            color: black;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            text-decoration: underline;
            margin-bottom: 20px;
        }

        form {
            max-width: 600px;
            margin: 0 auto;
            background-color: #FFF;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        label {
            display: block;
            font-weight: bold;
            margin-top: 10px;
        }

        input[type="text"],
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        select {
            width: 100%;
            background-image: linear-gradient(to bottom,#9600FF, #EEBD89);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }

        /* Style for the dropdown options */
        select option {
            background-color: #EEBD89;
            color: white;
        }

        input[type="submit"] {
            background-color: #9600FF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1 font color="black">Your Problem</h1></font>
    <form id="problemForm" enctype="multipart/form-data">
        <label for="problemID">Problem ID:</label>
        <input type="text" id="problemID" name="problemID" required>

        <label for="statement">Statement:</label>
        <textarea id="statement" name="statement" rows="5" cols="50" required></textarea>

        <label for="description">Description:</label>
        <textarea id="description" name="description" rows="10" cols="90" required></textarea>

        <label for="document">Attach Document:</label>
        <input type="file" id="document" name="document">

        <center><input type="submit" value="Submit"></center>
    </form>
</body>
</html>
